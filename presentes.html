<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function tocarUmaVez() {
  const audio = document.getElementById("musica");
  audio.play();
  
  // remove o evento depois do primeiro toque
  document.removeEventListener("click", tocarUmaVez);
});
</script>
    <audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
  if (localStorage.getItem("musica") === "tocando") {
    const audio = document.getElementById("musica");
    audio.play();
  }
});
</script>

    <div class="container">
        <h2>Lista de Presentes 💚</h2>
        <p class="obs-paleta">
    Obs: os presentes devem ser de acordo com a paleta das cores branco, areia, bege e palha 🤍
            Ps. Após digitar seu nome no(s) presente(s) escolhido(s), 
            é necessário a confirmação do(s) presente(s) no final da página no botão "Confirmar Presentes"
</p>


        <div id="lista-presentes"></div>

        <button class="botao" onclick="confirmarPresentes()">
            Confirmar presentes
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
