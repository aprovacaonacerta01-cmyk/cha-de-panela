<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Panela Camila e Lucas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function tocarUmaVez() {
  const audio = document.getElementById("musica");
  audio.play();
  
  // remove o evento depois do primeiro toque
  document.removeEventListener("click", tocarUmaVez);
});
</script>
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function tocarEMudarPagina(event) {
  event.preventDefault();

  const audio = new Audio("musica.mp3");
  audio.play();

  // salva que a música deve continuar
  localStorage.setItem("musica", "tocando");

  // pequeno delay pra garantir que começou
  setTimeout(() => {
    window.location.href = "presentes.html";
  }, 300);
}
</script>
    <div class="container">
        <h1>Chá de Panela Camila e Lucas 💚</h1>

        <p class="boas-vindas">
            Seja muito bem-vindo(a)! Estamos muito felizes em compartilhar esse momento especial com você.
        </p>

        <p class="frase">
            Escolha o presente com carinho 💍
        </p>
<div class="paleta-container">
    <p class="paleta-texto">
        Obs: os presentes devem seguir a paleta das cores branco, areia, bege e palha 🤍
    </p>

       <a href="presentes.html" class="botao" onclick="tocarEMudarPagina(event)">
    Ver a lista de presentes
</a>
    </div>

</body>
</html>
