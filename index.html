<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Panela Camila e Lucas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<audio id="musica" autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
  const audio = document.getElementById("musica");

  // tenta tocar automaticamente
  audio.play().then(() => {
    // depois de 1 segundo, tira o mudo
    setTimeout(() => {
      audio.muted = false;
    }, 1000);
  }).catch(() => {
    console.log("Autoplay bloqueado 😢");
  });
});
</script>
    <div class="container">
        <h1>Chá de Panela Camila e Lucas 💚</h1>

        <p class="boas-vindas">
            Seja muito bem-vindo(a)! Estamos muito felizes em compartilhar esse momento especial com você.
        </p>

        <p class="frase">
            Escolha o presente com carinho 💍
        </p>
<div class="paleta-container">
    <p class="paleta-texto">
        Obs: os presentes devem seguir a paleta das cores branco, areia, bege e palha 🤍
    </p>

        <a href="presentes.html" class="botao">
            Ver a lista de presentes
        </a>
    </div>

</body>
</html>
